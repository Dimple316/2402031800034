<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard - URL Safety Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>PhishGuard</h1>

            <button type="submit">Check Safety</button>
        </form>
    </div>
</body>
</html>
